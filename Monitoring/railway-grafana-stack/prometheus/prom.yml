global:
  scrape_interval: 15s # Default scrape interval

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Sample data generator (for testing dashboards)
  - job_name: 'sample-data'
    scrape_interval: 5s
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8001']

  # Real backend (when metrics endpoint is ready)
  - job_name: 'backend'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8000', 'backend:8000']

