name: CI Dự Án

on:
  push:
    paths:
      - "frontend/**"
      - "backend/**"
      - "docker-compose.yml"
      - "docker-compose.ci.yml"
      - ".env.docker.example"
      - ".github/workflows/project-ci.yml"
      - ".github/workflows/project-cd.yml"
  pull_request:
    paths:
      - "frontend/**"
      - "backend/**"
      - "docker-compose.yml"
      - "docker-compose.ci.yml"
      - ".env.docker.example"
      - ".github/workflows/project-ci.yml"
      - ".github/workflows/project-cd.yml"

permissions:
  contents: read
  issues: write

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    outputs:
      coverage: ${{ steps.extract-metrics.outputs.coverage }}
      coverage_details: ${{ steps.extract-metrics.outputs.coverage_details }}
      test_metrics: ${{ steps.extract-metrics.outputs.test_metrics }}
      ci_logs: ${{ steps.capture-logs.outputs.ci_logs }}

    steps:
      - name: Tải mã nguồn
        uses: actions/checkout@v6

      - name: Cài đặt Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Cài đặt dependencies
        run: npm ci 2>&1 | tee npm_ci.log

      - name: 🧹 Chạy lint
        run: npm run lint

      - name: 🧪 Chạy kiểm thử với coverage
        run: npx vitest run --coverage --reporter=default --reporter=json --outputFile=test-results.json 2>&1 | tee vitest.log

      - name: 📊 Trích xuất chỉ số (Metrics)
        id: extract-metrics
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            TOTAL_LINES=$(jq -r '.total.lines.pct' coverage/coverage-summary.json)
            TOTAL_STMT=$(jq -r '.total.statements.pct' coverage/coverage-summary.json)
            TOTAL_FUNC=$(jq -r '.total.functions.pct' coverage/coverage-summary.json)
            TOTAL_BRANCH=$(jq -r '.total.branches.pct' coverage/coverage-summary.json)
            echo "coverage=$TOTAL_LINES" >> "$GITHUB_OUTPUT"
            echo "coverage_details={\"lines\":$TOTAL_LINES,\"statements\":$TOTAL_STMT,\"functions\":$TOTAL_FUNC,\"branches\":$TOTAL_BRANCH}" >> "$GITHUB_OUTPUT"
          else
            echo "coverage=0" >> "$GITHUB_OUTPUT"
            echo "coverage_details={\"lines\":0,\"statements\":0,\"functions\":0,\"branches\":0}" >> "$GITHUB_OUTPUT"
          fi

          if [ -f test-results.json ]; then
            PASSED=$(jq '.numPassedTests' test-results.json)
            FAILED=$(jq '.numFailedTests' test-results.json)
            TOTAL=$(jq '.numTotalTests' test-results.json)
            SKIPPED=$(jq '.numPendingTests' test-results.json)
            echo "test_metrics={\"passed\":$PASSED,\"failed\":$FAILED,\"total\":$TOTAL,\"skipped\":$SKIPPED}" >> "$GITHUB_OUTPUT"
          else
            echo "test_metrics={\"passed\":0,\"failed\":0,\"total\":0,\"skipped\":0}" >> "$GITHUB_OUTPUT"
          fi

      - name: 🔍 Thu thập Logs Frontend
        id: capture-logs
        if: always()
        run: |
          {
            echo "┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓"
            echo "┃               💻 FRONTEND CI EXECUTION LOGS            ┃"
            echo "┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛"
            echo ""
            echo "📦 [STEP 1: DEPENDENCIES INSTALLATION]"
            echo "----------------------------------------------------------"
            tail -n 15 npm_ci.log || echo "No logs found."
            echo ""
            echo "🧪 [STEP 2: VITEST EXECUTION]"
            echo "----------------------------------------------------------"
            tail -n 45 vitest.log || echo "No logs found."
            echo ""
            echo "🏁 [EXECUTION FINISHED]"
          } > fe_combined.log
          LOGS_VAL=$(base64 -w 0 < fe_combined.log)
          echo "ci_logs=$LOGS_VAL" >> "$GITHUB_OUTPUT"

      - name: Tải artifact coverage frontend lên
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage-report
          path: frontend/coverage
          if-no-files-found: ignore

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    outputs:
      coverage: ${{ steps.extract-metrics.outputs.coverage }}
      test_metrics: ${{ steps.extract-metrics.outputs.test_metrics }}
      ci_logs: ${{ steps.capture-logs.outputs.ci_logs }}

    steps:
      - name: Tải mã nguồn
        uses: actions/checkout@v6

      - name: Cài đặt Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-test.txt

      - name: 📦 Cài đặt dependencies backend
        run: pip install -r requirements-test.txt 2>&1 | tee pip_install.log

      - name: 🧪 Chạy kiểm thử backend (Pytest)
        run: pytest --junitxml=junit.xml 2>&1 | tee pytest.log

      - name: 📊 Trích xuất chỉ số (Metrics)
        id: extract-metrics
        if: always()
        run: |
          if [ -f coverage.xml ]; then
            COVERAGE=$(python -c "import xml.etree.ElementTree as ET; tree = ET.parse('coverage.xml'); root = tree.getroot(); print(round(float(root.attrib['line-rate']) * 100, 2))")
            echo "coverage=$COVERAGE" >> "$GITHUB_OUTPUT"
          else
            echo "coverage=0" >> "$GITHUB_OUTPUT"
          fi

          if [ -f junit.xml ]; then
            python -c "import xml.etree.ElementTree as ET, json; \
              tree = ET.parse('junit.xml'); \
              root = tree.getroot(); \
              suites = [root] if root.tag == 'testsuite' else root.findall('.//testsuite'); \
              total = sum(int(s.attrib.get('tests', 0)) for s in suites); \
              failed = sum(int(s.attrib.get('failures', 0)) for s in suites); \
              errors = sum(int(s.attrib.get('errors', 0)) for s in suites); \
              skipped = sum(int(s.attrib.get('skipped', 0)) for s in suites); \
              passed = total - failed - errors - skipped; \
              print('test_metrics=' + json.dumps({'passed': passed, 'failed': failed + errors, 'total': total, 'skipped': skipped}))" >> "$GITHUB_OUTPUT"
          else
            echo "test_metrics={\"passed\":0,\"failed\":0,\"total\":0,\"skipped\":0}" >> "$GITHUB_OUTPUT"
          fi

      - name: 🔍 Thu thập Logs Backend
        id: capture-logs
        if: always()
        run: |
          {
            echo "┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓"
            echo "┃                🎬 BACKEND CI EXECUTION LOGS            ┃"
            echo "┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛"
            echo ""
            echo "📦 [STEP 1: DEPENDENCIES INSTALLATION]"
            echo "----------------------------------------------------------"
            tail -n 15 pip_install.log || echo "No logs found."
            echo ""
            echo "🧪 [STEP 2: PYTEST EXECUTION]"
            echo "----------------------------------------------------------"
            tail -n 45 pytest.log || echo "No logs found."
            echo ""
            echo "🏁 [EXECUTION FINISHED]"
          } > be_combined.log
          LOGS_VAL=$(base64 -w 0 < be_combined.log)
          echo "ci_logs=$LOGS_VAL" >> "$GITHUB_OUTPUT"

      - name: Tải artifact coverage backend lên
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage-report
          path: |
            backend/coverage.xml
            backend/htmlcov
          if-no-files-found: ignore

  docker-compose-smoke:
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: 0
      COMPOSE_DOCKER_CLI_BUILD: 0
    outputs:
      ci_logs: ${{ steps.capture-logs.outputs.ci_logs }}

    steps:
      - name: Tải mã nguồn
        uses: actions/checkout@v6

      - name: 🔧 Chuẩn bị file môi trường Docker
        run: cp .env.docker.example .env

      - name: 🐳 Build và khởi động Docker Compose
        run: |
          set -o pipefail
          docker compose -f docker-compose.ci.yml up -d --build 2>&1 | tee docker_up.log

      - name: 💓 Chờ backend sẵn sàng (Health Check)
        run: |
          echo "--- HEALTH CHECK LOGS ---" > health.log
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health >> health.log 2>&1; then
              echo "[$(date)] Backend is UP (Status 200)" >> health.log
              cat health.log
              exit 0
            fi
            echo "[$(date)] Waiting for backend..." >> health.log
            sleep 3
          done
          echo "❌ Kiểm tra health của backend thất bại" >> health.log
          docker compose -f docker-compose.ci.yml ps >> health.log
          docker compose -f docker-compose.ci.yml logs backend --tail=100 >> health.log
          cat health.log
          exit 1

      - name: 🌐 Kiểm tra frontend phản hồi
        run: |
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:3000 > /dev/null 2>&1; then
              echo "Frontend is UP"
              exit 0
            fi
            sleep 3
          done
          echo "Frontend is DOWN"
          docker compose -f docker-compose.ci.yml ps
          docker compose -f docker-compose.ci.yml logs frontend --tail=50
          exit 1

      - name: 🔍 Thu thập Logs Docker
        id: capture-logs
        if: always()
        run: |
          docker compose -f docker-compose.ci.yml ps > docker_ps.log 2>&1 || true
          docker compose -f docker-compose.ci.yml logs --no-color > docker_full.log 2>&1 || true
          {
            echo "┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓"
            echo "┃               🐳 DOCKER CI EXECUTION LOGS              ┃"
            echo "┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛"
            echo ""
            echo "🐳 [STEP 1: DOCKER COMPOSE UP]"
            echo "----------------------------------------------------------"
            tail -n 20 docker_up.log || echo "No logs found."
            echo ""
            echo "💓 [STEP 2: HEALTH CHECK]"
            echo "----------------------------------------------------------"
            cat health.log || echo "No health logs."
            echo ""
            echo "📦 [DOCKER PS]"
            echo "----------------------------------------------------------"
            cat docker_ps.log || echo "No docker ps logs."
            echo ""
            echo "📜 [DOCKER FULL LOGS]"
            echo "----------------------------------------------------------"
            tail -n 100 docker_full.log || echo "No docker logs found."
            echo ""
            echo "🏁 [EXECUTION FINISHED]"
          } > docker_combined.log
          LOGS_VAL=$(base64 -w 0 < docker_combined.log)
          echo "ci_logs=$LOGS_VAL" >> "$GITHUB_OUTPUT"

      - name: Dừng docker compose
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v

  ci-summary:
    runs-on: ubuntu-latest
    needs: [frontend, backend, docker-compose-smoke]
    if: always()
    steps:
      - name: 🎨 Tạo Dashboard Tóm tắt CI (Beautiful CI Dashboard)
        uses: actions/github-script@v8
        with:
          script: |
            const frontendRes = "${{ needs.frontend.result }}";
            const backendRes = "${{ needs.backend.result }}";
            const dockerRes = "${{ needs.docker-compose-smoke.result }}";

            const frontendCov = JSON.parse('${{ needs.frontend.outputs.coverage_details }}' || '{"lines":0,"statements":0,"functions":0,"branches":0}');
            const frontendTests = JSON.parse('${{ needs.frontend.outputs.test_metrics }}' || '{"passed":0,"failed":0,"total":0,"skipped":0}');
            
            const backendCov = "${{ needs.backend.outputs.coverage }}" || "0";
            const backendTests = JSON.parse('${{ needs.backend.outputs.test_metrics }}' || '{"passed":0,"failed":0,"total":0,"skipped":0}');

            const decodeLogs = (b64) => {
              if (!b64) return "Không có nhật ký.";
              try {
                return Buffer.from(b64, 'base64').toString('utf-8');
              } catch (e) {
                return "Lỗi giải mã nhật ký.";
              }
            };

            const feLogs = decodeLogs("${{ needs.frontend.outputs.ci_logs }}");
            const beLogs = decodeLogs("${{ needs.backend.outputs.ci_logs }}");
            const dockerLogs = decodeLogs("${{ needs.docker-compose-smoke.outputs.ci_logs }}");

            const icon = (res) => res === "success" ? "🟢" : (res === "failure" ? "🔴" : "⚪");
            const statusLabel = (res) => res === "success" ? "PASSED" : (res === "failure" ? "FAILED" : "SKIPPED");
            const progress = (pct) => {
              const count = Math.round(pct / 10);
              return "🟩".repeat(count) + "⬜".repeat(10 - count);
            };

            const summary = `
            # 🚀 CI Dashboard: ${context.repo.repo}
            
            > **Workflow:** \`${context.workflow}\` | **Branch:** \`${context.ref.replace('refs/heads/', '')}\` | **Actor:** @${context.actor}

            ---

            ## 📊 Trạng thái tổng quát (Overview)
            | Component | Status | Tests | Coverage |
            | :--- | :---: | :---: | :---: |
            | **🖥️ Frontend** | ${icon(frontendRes)} \`${statusLabel(frontendRes)}\` | ${frontendTests.passed}/${frontendTests.total} | \`${frontendCov.lines}%\` |
            | **⚙️ Backend** | ${icon(backendRes)} \`${statusLabel(backendRes)}\` | ${backendTests.passed}/${backendTests.total} | \`${backendCov}%\` |
            | **🐳 Docker Smoke** | ${icon(dockerRes)} \`${statusLabel(dockerRes)}\` | - | - |

            ---

            ## 🛠️ Chi tiết thực thi (Execution Details)

            ### 🖥️ Frontend (Vitest)
            ${progress(frontendCov.lines)} **${frontendCov.lines}%**
            - **Statements:** \`${frontendCov.statements}%\` | **Functions:** \`${frontendCov.functions}%\` | **Branches:** \`${frontendCov.branches}%\`

            <details>
            <summary><b>🔍 Xem Terminal Output (Frontend)</b></summary>

            \`\`\`bash
            ${feLogs}
            \`\`\`
            </details>

            ---

            ### ⚙️ Backend (Pytest)
            ${progress(backendCov)} **${backendCov}%**
            - **Passed:** ${backendTests.passed} | **Failed:** ${backendTests.failed} | **Skipped:** ${backendTests.skipped}

            <details>
            <summary><b>🔍 Xem Terminal Output (Backend)</b></summary>

            \`\`\`bash
            ${beLogs}
            \`\`\`
            </details>

            ---

            ### 🐳 Docker Smoke Test
            - **Build & Up:** ${dockerRes === "success" ? "✅ Thành công" : "❌ Thất bại"}
            - **Health Check:** ${dockerRes === "success" ? "✅ Thành công" : "❌ Thất bại"}

            <details>
            <summary><b>🔍 Xem Terminal Output (Docker)</b></summary>

            \`\`\`bash
            ${dockerLogs}
            \`\`\`
            </details>
            
            ---
            **Quick Links:** [📝 View Commit](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha}) | [📋 View Run Details](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            `;
            
            core.summary.addRaw(summary).write();

  report-failure:
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend
      - docker-compose-smoke
    if: >-
      always() &&
      github.event_name == 'push' &&
      (needs.frontend.result == 'failure' || needs.backend.result == 'failure' || needs.docker-compose-smoke.result == 'failure')

    steps:
      - name: Tạo hoặc cập nhật GitHub Issue khi CI lỗi
        uses: actions/github-script@v8
        env:
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          BACKEND_RESULT: ${{ needs.backend.result }}
          DOCKER_RESULT: ${{ needs.docker-compose-smoke.result }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.ref.replace('refs/heads/', '');
            const title = `🚨 [CI Failure] Luồng CI thất bại trên nhánh ${branch}`;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            
            const frontendStatus = process.env.FRONTEND_RESULT === 'success' ? '✅ Thành công' : '❌ Thất bại';
            const backendStatus = process.env.BACKEND_RESULT === 'success' ? '✅ Thành công' : '❌ Thất bại';
            const dockerStatus = process.env.DOCKER_RESULT === 'success' ? '✅ Thành công' : '❌ Thất bại';

            const body = [
              '## Báo cáo lỗi CI',
              '',
              'Hệ thống phát hiện lỗi trong quá trình kiểm tra tự động sau khi bạn đẩy code lên.',
              '',
              `- Người thực hiện: @${context.actor}`,
              `- Nhánh: \`${branch}\``,
              `- Commit: [\`${context.sha.substring(0, 7)}\`](${context.serverUrl}/${owner}/${repo}/commit/${context.sha})`,
              `- Workflow: \`${context.workflow}\``,
              '',
              '### Trạng thái các job',
              '| Job | Trạng thái |',
              '| :--- | :--- |',
              `| Frontend | ${frontendStatus} |`,
              `| Backend | ${backendStatus} |`,
              `| Docker Compose | ${dockerStatus} |`,
              '',
              '### Cách khắc phục',
              '1. Mở liên kết bên dưới để xem log chi tiết.',
              '2. Kiểm tra các bước lint, test hoặc build bị lỗi.',
              '3. Sửa lỗi ở máy local, chạy lại test và push lại.',
              '',
              `- Xem chi tiết tại GitHub Actions: ${runUrl}`,
              '',
              'Thông báo này được tạo tự động bởi GitHub Actions.',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const existingIssue = issues.find((issue) => issue.title === title);

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existingIssue.number,
                body: `🔄 **Cập nhật:** Pipeline lại tiếp tục thất bại tại commit ${context.sha.substring(0, 7)}.\n\n${body}`,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ['bug', 'ci-failure', 'critical'],
                assignees: [context.actor]
              });
            }
