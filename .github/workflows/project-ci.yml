name: Project CI

on:
  push:
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/project-ci.yml"
  pull_request:
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/project-ci.yml"

permissions:
  contents: read
  issues: write

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run test suite with coverage
        run: npm run test:coverage

      - name: Upload frontend coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: frontend/coverage
          if-no-files-found: ignore

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-test.txt

      - name: Install backend test dependencies
        run: pip install -r requirements-test.txt

      - name: Run backend test suite with coverage
        run: pytest

      - name: Upload backend coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: |
            backend/coverage.xml
            backend/htmlcov
          if-no-files-found: ignore

  docker-compose-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare docker environment file
        run: cp .env.docker.example .env

      - name: Build and start docker compose stack
        run: docker compose up -d --build

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 5
          done
          echo "Backend health check failed"
          docker compose ps
          exit 1

      - name: Verify frontend responds
        run: curl -fsS http://127.0.0.1:3000 > /dev/null

      - name: Show docker compose status on failure
        if: failure()
        run: docker compose ps

      - name: Show docker compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop docker compose stack
        if: always()
        run: docker compose down -v

  report-failure:
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend
      - docker-compose-smoke
    if: >-
      always() &&
      github.event_name == 'push' &&
      (needs.frontend.result == 'failure' || needs.backend.result == 'failure' || needs.docker-compose-smoke.result == 'failure')

    steps:
      - name: Create or update GitHub issue on failed push
        uses: actions/github-script@v7
        env:
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          BACKEND_RESULT: ${{ needs.backend.result }}
          DOCKER_RESULT: ${{ needs.docker-compose-smoke.result }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.ref.replace('refs/heads/', '');
            const title = `🚨 [CI Failure] Luồng CI thất bại trên nhánh ${branch}`;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            
            const frontendStatus = process.env.FRONTEND_RESULT === 'success' ? '✅ Thành công' : '❌ Thất bại';
            const backendStatus = process.env.BACKEND_RESULT === 'success' ? '✅ Thành công' : '❌ Thất bại';
            const dockerStatus = process.env.DOCKER_RESULT === 'success' ? '✅ Thành công' : '❌ Thất bại';

            const body = `
            ## ❌ CI Pipeline Failure Report
            
            Hệ thống phát hiện lỗi trong quá trình kiểm tra tự động (CI) sau khi bạn đẩy code lên.
            
            ### 📝 Thông tin chi tiết
            - **Người thực hiện:** @${context.actor}
            - **Nhánh:** \`${branch}\`
            - **Commit:** [\`${context.sha.substring(0, 7)}\`](${context.serverUrl}/${owner}/${repo}/commit/${context.sha})
            - **Workflow:** \`${context.workflow}\`
            
            ### 📊 Trạng thái các Job
            | Job Name | Status |
            | :--- | :--- |
            | 🖥️ **Frontend** | ${frontendStatus} |
            | ⚙️ **Backend** | ${backendStatus} |
            | 🐳 **Docker Compose** | ${dockerStatus} |
            
            ---
            ### 🔍 Cách khắc phục
            1. Nhấn vào link bên dưới để xem log chi tiết của lỗi.
            2. Kiểm tra các phần Linting, Testing hoặc Build bị fail.
            3. Sửa lỗi local, chạy test và push lại.
            
            🔗 **[Xem chi tiết lỗi tại GitHub Actions](${runUrl})**
            
            *Thông báo này được tạo tự động bởi GitHub Actions.*
            `;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const existingIssue = issues.find((issue) => issue.title === title);

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existingIssue.number,
                body: `🔄 **Cập nhật:** Pipeline lại tiếp tục thất bại tại commit ${context.sha.substring(0, 7)}.\n\n${body}`,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ['bug', 'ci-failure', 'critical'],
                assignees: [context.actor]
              });
            }
