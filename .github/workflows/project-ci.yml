name: CI Dự Án

on:
  push:
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/project-ci.yml"
  pull_request:
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/project-ci.yml"

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Tải mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cài đặt dependencies
        run: npm ci

      - name: Chạy lint
        run: npm run lint

      - name: Chạy kiểm thử với coverage
        run: npm run test:coverage

      - name: Tải artifact coverage frontend lên
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: frontend/coverage
          if-no-files-found: ignore

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Tải mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-test.txt

      - name: Cài đặt dependencies kiểm thử backend
        run: pip install -r requirements-test.txt

      - name: Chạy kiểm thử backend với coverage
        run: pytest

      - name: Tải artifact coverage backend lên
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: |
            backend/coverage.xml
            backend/htmlcov
          if-no-files-found: ignore

  docker-compose-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Tải mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Chuẩn bị file môi trường Docker
        run: cp .env.docker.example .env

      - name: Build và khởi động docker compose
        run: docker compose up -d --build --wait

      - name: Chờ backend sẵn sàng
        run: |
          for i in {1..15}; do
            if curl -fsS http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 3
          done
          echo "Kiểm tra health của backend thất bại"
          docker compose ps
          docker compose logs backend
          exit 1

      - name: Kiểm tra frontend phản hồi
        run: curl -fsS http://127.0.0.1:3000 > /dev/null

      - name: Hiển thị trạng thái docker compose khi lỗi
        if: failure()
        run: docker compose ps

      - name: Hiển thị log docker compose khi lỗi
        if: failure()
        run: docker compose logs --no-color

      - name: Dừng docker compose
        if: always()
        run: docker compose down -v

  report-failure:
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend
      - docker-compose-smoke
    if: >-
      always() &&
      github.event_name == 'push' &&
      (needs.frontend.result == 'failure' || needs.backend.result == 'failure' || needs.docker-compose-smoke.result == 'failure')

    steps:
      - name: Tạo hoặc cập nhật GitHub Issue khi CI lỗi
        uses: actions/github-script@v7
        env:
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          BACKEND_RESULT: ${{ needs.backend.result }}
          DOCKER_RESULT: ${{ needs.docker-compose-smoke.result }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.ref.replace('refs/heads/', '');
            const title = `🚨 [CI Failure] Luồng CI thất bại trên nhánh ${branch}`;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            
            const frontendStatus = process.env.FRONTEND_RESULT === 'success' ? '✅ Thành công' : '❌ Thất bại';
            const backendStatus = process.env.BACKEND_RESULT === 'success' ? '✅ Thành công' : '❌ Thất bại';
            const dockerStatus = process.env.DOCKER_RESULT === 'success' ? '✅ Thành công' : '❌ Thất bại';

            const body = [
              '## Báo cáo lỗi CI',
              '',
              'Hệ thống phát hiện lỗi trong quá trình kiểm tra tự động sau khi bạn đẩy code lên.',
              '',
              `- Người thực hiện: @${context.actor}`,
              `- Nhánh: \`${branch}\``,
              `- Commit: [\`${context.sha.substring(0, 7)}\`](${context.serverUrl}/${owner}/${repo}/commit/${context.sha})`,
              `- Workflow: \`${context.workflow}\``,
              '',
              '### Trạng thái các job',
              '| Job | Trạng thái |',
              '| :--- | :--- |',
              `| Frontend | ${frontendStatus} |`,
              `| Backend | ${backendStatus} |`,
              `| Docker Compose | ${dockerStatus} |`,
              '',
              '### Cách khắc phục',
              '1. Mở liên kết bên dưới để xem log chi tiết.',
              '2. Kiểm tra các bước lint, test hoặc build bị lỗi.',
              '3. Sửa lỗi ở máy local, chạy lại test và push lại.',
              '',
              `- Xem chi tiết tại GitHub Actions: ${runUrl}`,
              '',
              'Thông báo này được tạo tự động bởi GitHub Actions.',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const existingIssue = issues.find((issue) => issue.title === title);

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existingIssue.number,
                body: `🔄 **Cập nhật:** Pipeline lại tiếp tục thất bại tại commit ${context.sha.substring(0, 7)}.\n\n${body}`,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ['bug', 'ci-failure', 'critical'],
                assignees: [context.actor]
              });
            }
