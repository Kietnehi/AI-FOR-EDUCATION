name: CD Dự Án

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Môi trường CD tượng trưng"
        required: false
        default: "staging-placeholder"
        type: choice
        options:
          - staging-placeholder
          - production-placeholder
  workflow_run:
    workflows:
      - CI Dự Án
    types:
      - completed
    branches:
      - main
      - ductoan

permissions:
  contents: read
  issues: write

env:
  SOURCE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
  SOURCE_BRANCH: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
  TARGET_ENVIRONMENT: ${{ github.event.inputs.target_environment || 'staging-placeholder' }}

jobs:
  prepare-release:
    runs-on:
      - self-hosted
      - Windows
      - x64
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      release_name: ${{ steps.meta.outputs.release_name }}
      release_version: ${{ steps.meta.outputs.release_version }}
      release_sha_short: ${{ steps.meta.outputs.release_sha_short }}

    steps:
      - name: Tải mã nguồn
        uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Tạo metadata phát hành
        id: meta
        shell: powershell
        run: |
          $shaShort = "${env:SOURCE_SHA}".Substring(0, 7)
          $releaseVersion = "placeholder-$shaShort"
          $releaseName = "AI Learning Studio $releaseVersion"
          New-Item -ItemType Directory -Force -Path release | Out-Null

          $metadata = @{
            releaseName = $releaseName
            releaseVersion = $releaseVersion
            commitSha = "${env:SOURCE_SHA}"
            commitShaShort = $shaShort
            branch = "${env:SOURCE_BRANCH}"
            workflow = "${env:GITHUB_WORKFLOW}"
            runId = "${env:GITHUB_RUN_ID}"
            targetEnvironment = "${env:TARGET_ENVIRONMENT}"
            generatedAt = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          } | ConvertTo-Json
          Set-Content -Path release/release-metadata.json -Value $metadata -Encoding UTF8

          $notes = @"
          # Ghi chú phát hành tượng trưng

          - Bản phát hành: $releaseName
          - Phiên bản: $releaseVersion
          - Nhánh: ${env:SOURCE_BRANCH}
          - Commit: ${env:SOURCE_SHA}
          - Môi trường đích: ${env:TARGET_ENVIRONMENT}
          - Trạng thái: Sẵn sàng cho bước triển khai
          "@
          Set-Content -Path release/release-notes.md -Value $notes.TrimStart() -Encoding UTF8

          "release_name=$releaseName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "release_version=$releaseVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "release_sha_short=$shaShort" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Chuẩn bị file môi trường Docker
        shell: powershell
        run: |
          if (-not (Test-Path ".env.prod")) {
            if (Test-Path ".env.prod.example") {
              Copy-Item -Path .env.prod.example -Destination .env.prod -Force
              Write-Host "Đã copy .env.prod.example sang .env.prod"
            }
          }

      - name: Tải artifact metadata phát hành lên
        uses: actions/upload-artifact@v7
        with:
          name: cd-release-metadata
          path: release

  deploy-placeholder:
    runs-on:
      - self-hosted
      - Windows
      - x64
    needs:
      - prepare-release
    environment:
      name: ${{ github.event.inputs.target_environment || 'production-local' }}

    steps:
      - name: Tải mã nguồn
        uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Triển khai trực tiếp bằng Docker Compose trên self-hosted runner
        shell: powershell
        run: |
          if (-not (Test-Path "scripts/deploy.ps1")) {
            throw "Missing deploy script: scripts/deploy.ps1"
          }
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\deploy.ps1

      - name: Tạo báo cáo triển khai
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release/deploy | Out-Null
          $summary = @"
          # Báo cáo triển khai tự động

          - Bản phát hành: ${{ needs.prepare-release.outputs.release_name }}
          - Phiên bản: ${{ needs.prepare-release.outputs.release_version }}
          - Môi trường đích: ${env:TARGET_ENVIRONMENT}
          - Nhánh nguồn: ${env:SOURCE_BRANCH}
          - Commit: ${env:SOURCE_SHA}
          - Người kích hoạt: ${env:GITHUB_ACTOR}
          - Lần chạy workflow: ${env:GITHUB_SERVER_URL}/${env:GITHUB_REPOSITORY}/actions/runs/${env:GITHUB_RUN_ID}
          - Registry image: Không dùng (local build)
          - Cách triển khai: Self-hosted Windows runner build local image bằng Docker Compose

          Trạng thái hiện tại:

          - Frontend/Backend images được build thông qua Docker Compose trực tiếp trên máy chủ
          - Dịch vụ được khởi động lại thành công
          "@
          Set-Content -Path release/deploy/deployment-summary.md -Value $summary.TrimStart() -Encoding UTF8
          Get-Content release/deploy/deployment-summary.md | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Tải artifact báo cáo triển khai lên
        uses: actions/upload-artifact@v7
        with:
          name: deployment-summary-${{ needs.prepare-release.outputs.release_sha_short }}
          path: release/deploy/deployment-summary.md

  cd-summary:
    runs-on:
      - self-hosted
      - Windows
      - x64
    needs:
      - prepare-release
      - deploy-placeholder
    if: always()
    steps:
      - name: Tạo tóm tắt công việc CD chi tiết (Detailed CD Job Summary)
        uses: actions/github-script@v8
        with:
          script: |
            const results = {
              prepare: "${{ needs.prepare-release.result }}",
              deploy: "${{ needs.deploy-placeholder.result }}"
            };
            
            const statusIcon = (res) => res === "success" ? "✅" : (res === "failure" ? "❌" : "⏭️");
            const statusText = (res) => res === "success" ? "Thành công" : (res === "failure" ? "Thất bại" : "Bỏ qua");

            const summary = `
            # 🚢 Báo cáo Tóm tắt CD Chi tiết (Dự Án AI Learning Studio)
            
            | Thông tin | Chi tiết |
            | :--- | :--- |
            | **Bản phát hành** | \`${{ needs.prepare-release.outputs.release_name }}\` |
            | **Phiên bản** | \`${{ needs.prepare-release.outputs.release_version }}\` |
            | **Môi trường** | \`${process.env.TARGET_ENVIRONMENT}\` |
            | **Người thực hiện** | @${context.actor} |
            | **Thời điểm** | ${new Date().toLocaleString('vi-VN', { timeZone: 'Asia/Ho_Chi_Minh' })} |
            
            ---

            ## 📦 Trạng thái quy trình (Pipeline Status)
            | Thành phần | Trạng thái | Chi tiết |
            | :--- | :---: | :--- |
            | 🛠️ **Chuẩn bị Metadata** | ${statusIcon(results.prepare)} | ${statusText(results.prepare)} |
            | 🚀 **Deploy (Docker Compose Build)** | ${statusIcon(results.deploy)} | ${statusText(results.deploy)} |
            
            ---
            *Ghi chú: Pipeline đã được tối ưu, loại bỏ các bước build artifacts dư thừa. Sử dụng Docker Compose để build image và chạy trực tiếp trên self-hosted Windows runner.*
            `;
            
            core.summary.addRaw(summary).write();

  report-failure:
    runs-on:
      - self-hosted
      - Windows
      - x64
    needs:
      - prepare-release
      - deploy-placeholder
    if: >-
      always() &&
      (
        needs.prepare-release.result == 'failure' ||
        needs.deploy-placeholder.result == 'failure'
      )

    steps:
      - name: Tạo hoặc cập nhật GitHub Issue khi CD lỗi
        uses: actions/github-script@v8
        env:
          PREPARE_RESULT: ${{ needs.prepare-release.result }}
          DEPLOY_RESULT: ${{ needs.deploy-placeholder.result }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = process.env.GITHUB_REF_NAME || 'main';
            const title = `🚨 [CD Failure] Luồng CD thất bại trên nhánh ${branch}`;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

            const rows = [
              ['Chuẩn bị phát hành', process.env.PREPARE_RESULT],
              ['Triển khai trên self-hosted runner (Docker Compose)', process.env.DEPLOY_RESULT],
            ];

            const toStatus = (value) => value === 'success' ? '✅ THÀNH CÔNG' : value === 'failure' ? '❌ THẤT BẠI' : '⏭️ BỎ QUA';
            const failedJobs = rows.filter(([(name), result]) => result === 'failure').map(([name]) => `- ${name}`).join('\n');
            const table = rows.map(([name, result]) => `| ${name} | ${toStatus(result)} |`).join('\n');

            const body = [
              '## Báo cáo lỗi CD',
              '',
              'CD gặp lỗi sau một lần chạy pipeline phát hành.',
              '',
              `- Nhánh: \`${branch}\``,
              `- Commit: \`${process.env.SOURCE_SHA || context.sha}\``,
              `- Người kích hoạt: @${context.actor}`,
              `- Workflow: \`${context.workflow}\``,
              `- Môi trường đích: \`${process.env.TARGET_ENVIRONMENT || 'staging-placeholder'}\``,
              '',
              '### Các job lỗi',
              failedJobs || '- Không xác định được job lỗi',
              '',
              '### Trạng thái các job',
              '| Job | Trạng thái |',
              '| :--- | :--- |',
              table,
              '',
              '### Chi tiết lần chạy',
              `- GitHub Actions: ${runUrl}`,
              '',
              'Thông báo này được tạo tự động bởi GitHub Actions.',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const existingIssue = issues.find((issue) => issue.title === title);

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existingIssue.number,
                body: `Cập nhật lỗi CD mới:\n\n${body}`,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ['bug', 'cd-failure'],
                assignees: [context.actor],
              });
            }
