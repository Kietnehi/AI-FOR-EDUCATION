name: CD Dự Án

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Môi trường CD tượng trưng"
        required: false
        default: "staging-placeholder"
        type: choice
        options:
          - staging-placeholder
          - production-placeholder
  workflow_run:
    workflows:
      - CI Dự Án
    types:
      - completed
    branches:
      - main
      - kiet

permissions:
  contents: read
  issues: write
  packages: write

env:
  SOURCE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
  SOURCE_BRANCH: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
  TARGET_ENVIRONMENT: ${{ github.event.inputs.target_environment || 'staging-placeholder' }}

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      release_name: ${{ steps.meta.outputs.release_name }}
      release_version: ${{ steps.meta.outputs.release_version }}
      release_sha_short: ${{ steps.meta.outputs.release_sha_short }}
      image_namespace: ${{ steps.meta.outputs.image_namespace }}
      repository_name: ${{ steps.meta.outputs.repository_name }}
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
      publish_latest: ${{ steps.meta.outputs.publish_latest }}

    steps:
      - name: Tải mã nguồn
        uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Tạo metadata phát hành
        id: meta
        shell: bash
        run: |
          SHA_SHORT="${SOURCE_SHA::7}"
          RELEASE_VERSION="placeholder-${SHA_SHORT}"
          RELEASE_NAME="AI Learning Studio ${RELEASE_VERSION}"
          IMAGE_NAMESPACE="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          REPOSITORY_NAME="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          BACKEND_IMAGE="ghcr.io/${IMAGE_NAMESPACE}/${REPOSITORY_NAME}-backend"
          FRONTEND_IMAGE="ghcr.io/${IMAGE_NAMESPACE}/${REPOSITORY_NAME}-frontend"
          PUBLISH_LATEST="false"
          if [ "${SOURCE_BRANCH}" = "main" ]; then
            PUBLISH_LATEST="true"
          fi
          mkdir -p release
          cat > release/release-metadata.json <<EOF
          {
            "releaseName": "${RELEASE_NAME}",
            "releaseVersion": "${RELEASE_VERSION}",
            "commitSha": "${SOURCE_SHA}",
            "commitShaShort": "${SHA_SHORT}",
            "branch": "${SOURCE_BRANCH}",
            "workflow": "${GITHUB_WORKFLOW}",
            "runId": "${GITHUB_RUN_ID}",
            "targetEnvironment": "${TARGET_ENVIRONMENT}",
            "backendImage": "${BACKEND_IMAGE}",
            "frontendImage": "${FRONTEND_IMAGE}",
            "generatedAt": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          }
          EOF
          cat > release/release-notes.md <<EOF
          # Ghi chú phát hành tượng trưng

          - Bản phát hành: ${RELEASE_NAME}
          - Phiên bản: ${RELEASE_VERSION}
          - Nhánh: ${SOURCE_BRANCH}
          - Commit: ${SOURCE_SHA}
          - Môi trường đích: ${TARGET_ENVIRONMENT}
          - Ảnh Docker backend: ${BACKEND_IMAGE}:${RELEASE_VERSION}
          - Ảnh Docker frontend: ${FRONTEND_IMAGE}:${RELEASE_VERSION}
          - Trạng thái: Sẵn sàng cho bước triển khai tượng trưng
          EOF
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "image_namespace=${IMAGE_NAMESPACE}" >> "$GITHUB_OUTPUT"
          echo "repository_name=${REPOSITORY_NAME}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${BACKEND_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${FRONTEND_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "publish_latest=${PUBLISH_LATEST}" >> "$GITHUB_OUTPUT"

      - name: Tải artifact metadata phát hành lên
        uses: actions/upload-artifact@v7
        with:
          name: cd-release-metadata
          path: release

  build-frontend-artifact:
    runs-on: ubuntu-latest
    needs: prepare-release
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Tải mã nguồn
        uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Cài đặt Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cài đặt dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Đóng gói bundle phát hành frontend
        shell: bash
        run: |
          mkdir -p ../release/frontend
          cp -R .next ../release/frontend/.next
          cp -R public ../release/frontend/public
          cp package.json ../release/frontend/package.json
          cp package-lock.json ../release/frontend/package-lock.json
          cp next.config.mjs ../release/frontend/next.config.mjs

      - name: Tải artifact frontend lên
        uses: actions/upload-artifact@v7
        with:
          name: frontend-release-bundle-${{ needs.prepare-release.outputs.release_sha_short }}
          path: release/frontend

  package-backend-artifact:
    runs-on: ubuntu-latest
    needs: prepare-release
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Tải mã nguồn
        uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Cài đặt Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Kiểm tra cú pháp mã nguồn backend
        run: python -m compileall app

      - name: Đóng gói bundle phát hành backend
        shell: bash
        run: |
          mkdir -p ../release/backend
          cp -R app ../release/backend/app
          cp requirements.txt ../release/backend/requirements.txt
          cp requirements-test.txt ../release/backend/requirements-test.txt
          cp Dockerfile ../release/backend/Dockerfile
          cp pytest.ini ../release/backend/pytest.ini

      - name: Tải artifact backend lên
        uses: actions/upload-artifact@v7
        with:
          name: backend-release-bundle-${{ needs.prepare-release.outputs.release_sha_short }}
          path: release/backend

  package-docker-bundle:
    runs-on: ubuntu-latest
    needs: prepare-release

    steps:
      - name: Tải mã nguồn
        uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Chuẩn bị file môi trường Docker
        run: cp .env.docker.example .env

      - name: Kiểm tra cấu hình docker compose
        run: docker compose config > release-docker-compose.resolved.yml

      - name: Đóng gói bundle phát hành Docker
        shell: bash
        run: |
          mkdir -p release/docker
          cp docker-compose.yml release/docker/docker-compose.yml
          cp .env.docker.example release/docker/.env.docker.example
          cp release-docker-compose.resolved.yml release/docker/docker-compose.resolved.yml

      - name: Tải artifact Docker lên
        uses: actions/upload-artifact@v7
        with:
          name: docker-release-bundle-${{ needs.prepare-release.outputs.release_sha_short }}
          path: release/docker

  publish-container-images:
    runs-on: ubuntu-latest
    needs: prepare-release

    steps:
      - name: Tải mã nguồn
        uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Cài đặt Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Đăng nhập GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tạo metadata ảnh backend
        id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.prepare-release.outputs.backend_image }}
          tags: |
            type=raw,value=${{ needs.prepare-release.outputs.release_version }}
            type=raw,value=sha-${{ needs.prepare-release.outputs.release_sha_short }}
            type=raw,value=latest,enable=${{ needs.prepare-release.outputs.publish_latest == 'true' }}
          labels: |
            org.opencontainers.image.title=AI-FOR-EDUCATION Backend
            org.opencontainers.image.description=Ảnh Docker backend của dự án AI-FOR-EDUCATION
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ env.SOURCE_SHA }}

      - name: Build và đẩy ảnh backend lên GHCR
        id: backend-build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}
          cache-from: type=gha,scope=backend-ghcr
          cache-to: type=gha,mode=max,scope=backend-ghcr

      - name: Tạo metadata ảnh frontend
        id: frontend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.prepare-release.outputs.frontend_image }}
          tags: |
            type=raw,value=${{ needs.prepare-release.outputs.release_version }}
            type=raw,value=sha-${{ needs.prepare-release.outputs.release_sha_short }}
            type=raw,value=latest,enable=${{ needs.prepare-release.outputs.publish_latest == 'true' }}
          labels: |
            org.opencontainers.image.title=AI-FOR-EDUCATION Frontend
            org.opencontainers.image.description=Ảnh Docker frontend của dự án AI-FOR-EDUCATION
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ env.SOURCE_SHA }}

      - name: Build và đẩy ảnh frontend lên GHCR
        id: frontend-build
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api
            NEXT_PUBLIC_API_HOST=http://localhost:8000
          cache-from: type=gha,scope=frontend-ghcr
          cache-to: type=gha,mode=max,scope=frontend-ghcr

      - name: Tạo báo cáo publish ảnh Docker
        shell: bash
        run: |
          mkdir -p release/images
          cat > release/images/published-images.md <<EOF
          # Báo cáo publish ảnh Docker

          ## Backend

          - Ảnh: `${{ needs.prepare-release.outputs.backend_image }}`
          - Tag phát hành: `${{ needs.prepare-release.outputs.release_version }}`
          - Tag SHA: `sha-${{ needs.prepare-release.outputs.release_sha_short }}`
          - Tag latest: `${{ needs.prepare-release.outputs.publish_latest == 'true' && 'có' || 'không' }}`
          - Digest: `${{ steps.backend-build.outputs.digest }}`

          ## Frontend

          - Ảnh: `${{ needs.prepare-release.outputs.frontend_image }}`
          - Tag phát hành: `${{ needs.prepare-release.outputs.release_version }}`
          - Tag SHA: `sha-${{ needs.prepare-release.outputs.release_sha_short }}`
          - Tag latest: `${{ needs.prepare-release.outputs.publish_latest == 'true' && 'có' || 'không' }}`
          - Digest: `${{ steps.frontend-build.outputs.digest }}`
          EOF
          cat > release/images/published-images.json <<EOF
          {
            "backend": {
              "image": "${{ needs.prepare-release.outputs.backend_image }}",
              "releaseTag": "${{ needs.prepare-release.outputs.release_version }}",
              "shaTag": "sha-${{ needs.prepare-release.outputs.release_sha_short }}",
              "latestTagPublished": ${{ needs.prepare-release.outputs.publish_latest == 'true' }},
              "digest": "${{ steps.backend-build.outputs.digest }}"
            },
            "frontend": {
              "image": "${{ needs.prepare-release.outputs.frontend_image }}",
              "releaseTag": "${{ needs.prepare-release.outputs.release_version }}",
              "shaTag": "sha-${{ needs.prepare-release.outputs.release_sha_short }}",
              "latestTagPublished": ${{ needs.prepare-release.outputs.publish_latest == 'true' }},
              "digest": "${{ steps.frontend-build.outputs.digest }}"
            }
          }
          EOF
          cat release/images/published-images.md >> "$GITHUB_STEP_SUMMARY"

      - name: Tải artifact thông tin ảnh Docker lên
        uses: actions/upload-artifact@v7
        with:
          name: published-container-images-${{ needs.prepare-release.outputs.release_sha_short }}
          path: release/images

  deploy-placeholder:
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - build-frontend-artifact
      - package-backend-artifact
      - package-docker-bundle
      - publish-container-images
    environment:
      name: ${{ github.event.inputs.target_environment || 'staging-placeholder' }}

    steps:
      - name: Tải artifact metadata phát hành xuống
        uses: actions/download-artifact@v7
        with:
          name: cd-release-metadata
          path: release/metadata

      - name: Tạo báo cáo triển khai tượng trưng
        shell: bash
        run: |
          mkdir -p release/deploy
          cat > release/deploy/deployment-summary.md <<EOF
          # Báo cáo triển khai tượng trưng

          - Bản phát hành: ${{ needs.prepare-release.outputs.release_name }}
          - Phiên bản: ${{ needs.prepare-release.outputs.release_version }}
          - Môi trường đích: ${TARGET_ENVIRONMENT}
          - Nhánh nguồn: ${SOURCE_BRANCH}
          - Commit: ${SOURCE_SHA}
          - Người kích hoạt: ${GITHUB_ACTOR}
          - Lần chạy workflow: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          - URL công khai: chưa-cấu-hình
          - Ảnh backend trên GHCR: ${{ needs.prepare-release.outputs.backend_image }}:${{ needs.prepare-release.outputs.release_version }}
          - Ảnh frontend trên GHCR: ${{ needs.prepare-release.outputs.frontend_image }}:${{ needs.prepare-release.outputs.release_version }}
          - Chế độ triển khai: chỉ tượng trưng

          Trạng thái hiện tại:

          - Frontend đã build xong và đã tải bundle artifact lên
          - Backend đã kiểm tra cú pháp và đã tải bundle artifact lên
          - Cấu hình docker compose đã được resolve thành công
          - Ảnh Docker backend và frontend đã được publish lên GHCR
          - Chưa thực hiện triển khai lên server thật
          EOF
          cat release/deploy/deployment-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Tải artifact báo cáo triển khai lên
        uses: actions/upload-artifact@v7
        with:
          name: deployment-summary-${{ needs.prepare-release.outputs.release_sha_short }}
          path: |
            release/deploy/deployment-summary.md
            release/metadata/release-metadata.json
            release/metadata/release-notes.md

  release-bundle:
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - build-frontend-artifact
      - package-backend-artifact
      - package-docker-bundle
      - publish-container-images
      - deploy-placeholder

    steps:
      - name: Tải artifact metadata phát hành xuống
        uses: actions/download-artifact@v7
        with:
          name: cd-release-metadata
          path: release-bundle/metadata

      - name: Tải artifact frontend xuống
        uses: actions/download-artifact@v7
        with:
          name: frontend-release-bundle-${{ needs.prepare-release.outputs.release_sha_short }}
          path: release-bundle/frontend

      - name: Tải artifact backend xuống
        uses: actions/download-artifact@v7
        with:
          name: backend-release-bundle-${{ needs.prepare-release.outputs.release_sha_short }}
          path: release-bundle/backend

      - name: Tải artifact Docker xuống
        uses: actions/download-artifact@v7
        with:
          name: docker-release-bundle-${{ needs.prepare-release.outputs.release_sha_short }}
          path: release-bundle/docker

      - name: Tải artifact báo cáo triển khai xuống
        uses: actions/download-artifact@v7
        with:
          name: deployment-summary-${{ needs.prepare-release.outputs.release_sha_short }}
          path: release-bundle/deploy

      - name: Tải artifact thông tin ảnh Docker xuống
        uses: actions/download-artifact@v7
        with:
          name: published-container-images-${{ needs.prepare-release.outputs.release_sha_short }}
          path: release-bundle/container-images

      - name: Tải artifact bundle phát hành tổng hợp lên
        uses: actions/upload-artifact@v7
        with:
          name: full-release-bundle-${{ needs.prepare-release.outputs.release_sha_short }}
          path: release-bundle

  report-failure:
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - build-frontend-artifact
      - package-backend-artifact
      - package-docker-bundle
      - publish-container-images
      - deploy-placeholder
      - release-bundle
    if: >-
      always() &&
      (
        needs.prepare-release.result == 'failure' ||
        needs.build-frontend-artifact.result == 'failure' ||
        needs.package-backend-artifact.result == 'failure' ||
        needs.package-docker-bundle.result == 'failure' ||
        needs.publish-container-images.result == 'failure' ||
        needs.deploy-placeholder.result == 'failure' ||
        needs.release-bundle.result == 'failure'
      )

    steps:
      - name: Tạo hoặc cập nhật GitHub Issue khi CD lỗi
        uses: actions/github-script@v8
        env:
          PREPARE_RESULT: ${{ needs.prepare-release.result }}
          FRONTEND_RESULT: ${{ needs.build-frontend-artifact.result }}
          BACKEND_RESULT: ${{ needs.package-backend-artifact.result }}
          DOCKER_RESULT: ${{ needs.package-docker-bundle.result }}
          GHCR_RESULT: ${{ needs.publish-container-images.result }}
          DEPLOY_RESULT: ${{ needs.deploy-placeholder.result }}
          BUNDLE_RESULT: ${{ needs.release-bundle.result }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = process.env.GITHUB_REF_NAME || 'main';
            const title = `🚨 [CD Failure] Luồng CD thất bại trên nhánh ${branch}`;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

            const rows = [
              ['Chuẩn bị phát hành', process.env.PREPARE_RESULT],
              ['Bundle frontend', process.env.FRONTEND_RESULT],
              ['Bundle backend', process.env.BACKEND_RESULT],
              ['Bundle Docker', process.env.DOCKER_RESULT],
              ['Publish ảnh Docker lên GHCR', process.env.GHCR_RESULT],
              ['Triển khai tượng trưng', process.env.DEPLOY_RESULT],
              ['Bundle phát hành tổng hợp', process.env.BUNDLE_RESULT],
            ];

            const toStatus = (value) => value === 'success' ? 'THÀNH CÔNG' : value === 'failure' ? 'THẤT BẠI' : 'BỎ QUA';
            const failedJobs = rows.filter(([, result]) => result === 'failure').map(([name]) => `- ${name}`).join('\n');
            const table = rows.map(([name, result]) => `| ${name} | ${toStatus(result)} |`).join('\n');

            const body = [
              '## Báo cáo lỗi CD',
              '',
              'CD tượng trưng gặp lỗi sau một lần chạy pipeline phát hành.',
              '',
              `- Nhánh: \`${branch}\``,
              `- Commit: \`${process.env.SOURCE_SHA || context.sha}\``,
              `- Người kích hoạt: @${context.actor}`,
              `- Workflow: \`${context.workflow}\``,
              `- Môi trường đích: \`${process.env.TARGET_ENVIRONMENT || 'staging-placeholder'}\``,
              '',
              '### Các job lỗi',
              failedJobs || '- Không xác định được job lỗi',
              '',
              '### Trạng thái các job',
              '| Job | Trạng thái |',
              '| :--- | :--- |',
              table,
              '',
              '### Chi tiết lần chạy',
              `- GitHub Actions: ${runUrl}`,
              '',
              'Thông báo này được tạo tự động bởi GitHub Actions.',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const existingIssue = issues.find((issue) => issue.title === title);

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existingIssue.number,
                body: `Cập nhật lỗi CD mới:\n\n${body}`,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ['bug', 'cd-failure'],
                assignees: [context.actor],
              });
            }
