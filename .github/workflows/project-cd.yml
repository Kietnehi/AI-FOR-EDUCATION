name: CD Dự Án

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Môi trường CD tượng trưng"
        required: false
        default: "staging-placeholder"
        type: choice
        options:
          - staging-placeholder
          - production-placeholder
  workflow_run:
    workflows:
      - CI Dự Án
    types:
      - completed
    branches:
      - main
      - kiet

permissions:
  contents: read
  issues: write
  packages: write

env:
  SOURCE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
  SOURCE_BRANCH: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
  TARGET_ENVIRONMENT: ${{ github.event.inputs.target_environment || 'staging-placeholder' }}

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      release_name: ${{ steps.meta.outputs.release_name }}
      release_version: ${{ steps.meta.outputs.release_version }}
      release_sha_short: ${{ steps.meta.outputs.release_sha_short }}

    steps:
      - name: Tải mã nguồn
        uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Tạo metadata phát hành
        id: meta
        shell: bash
        run: |
          SHA_SHORT="${SOURCE_SHA::7}"
          RELEASE_VERSION="placeholder-${SHA_SHORT}"
          RELEASE_NAME="AI Learning Studio ${RELEASE_VERSION}"
          mkdir -p release
          cat > release/release-metadata.json <<EOF
          {
            "releaseName": "${RELEASE_NAME}",
            "releaseVersion": "${RELEASE_VERSION}",
            "commitSha": "${SOURCE_SHA}",
            "commitShaShort": "${SHA_SHORT}",
            "branch": "${SOURCE_BRANCH}",
            "workflow": "${GITHUB_WORKFLOW}",
            "runId": "${GITHUB_RUN_ID}",
            "targetEnvironment": "${TARGET_ENVIRONMENT}",
            "generatedAt": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          }
          EOF
          cat > release/release-notes.md <<EOF
          # Ghi chú phát hành tượng trưng

          - Bản phát hành: ${RELEASE_NAME}
          - Phiên bản: ${RELEASE_VERSION}
          - Nhánh: ${SOURCE_BRANCH}
          - Commit: ${SOURCE_SHA}
          - Môi trường đích: ${TARGET_ENVIRONMENT}
          - Trạng thái: Sẵn sàng cho bước triển khai tượng trưng
          EOF
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Tải artifact metadata phát hành lên
        uses: actions/upload-artifact@v7
        with:
          name: cd-release-metadata
          path: release

  build-frontend-artifact:
    runs-on: ubuntu-latest
    needs: prepare-release
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Tải mã nguồn
        uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Cài đặt Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cài đặt dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Đóng gói bundle phát hành frontend
        shell: bash
        run: |
          mkdir -p ../release/frontend
          cp -R .next ../release/frontend/.next
          cp -R public ../release/frontend/public
          cp package.json ../release/frontend/package.json
          cp package-lock.json ../release/frontend/package-lock.json
          cp next.config.mjs ../release/frontend/next.config.mjs

      - name: Tải artifact frontend lên
        uses: actions/upload-artifact@v7
        with:
          name: frontend-release-bundle-${{ needs.prepare-release.outputs.release_sha_short }}
          path: release/frontend

  package-backend-artifact:
    runs-on: ubuntu-latest
    needs: prepare-release
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Tải mã nguồn
        uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Cài đặt Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Kiểm tra cú pháp mã nguồn backend
        run: python -m compileall app

      - name: Đóng gói bundle phát hành backend
        shell: bash
        run: |
          mkdir -p ../release/backend
          cp -R app ../release/backend/app
          cp requirements.txt ../release/backend/requirements.txt
          cp requirements-test.txt ../release/backend/requirements-test.txt
          cp Dockerfile ../release/backend/Dockerfile
          cp pytest.ini ../release/backend/pytest.ini

      - name: Tải artifact backend lên
        uses: actions/upload-artifact@v7
        with:
          name: backend-release-bundle-${{ needs.prepare-release.outputs.release_sha_short }}
          path: release/backend

  package-docker-bundle:
    runs-on: ubuntu-latest
    needs: prepare-release

    steps:
      - name: Tải mã nguồn
        uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Cài đặt Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Kiểm tra secrets publish Docker Hub
        shell: bash
        run: |
          [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] || { echo "Missing secret: DOCKERHUB_USERNAME"; exit 1; }
          [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ] || { echo "Missing secret: DOCKERHUB_TOKEN"; exit 1; }

      - name: Chuẩn bị file môi trường Docker
        run: cp .env.docker.example .env

      - name: Kiểm tra cấu hình docker compose
        run: docker compose config > release-docker-compose.resolved.yml

      - name: Đóng gói bundle phát hành Docker
        shell: bash
        run: |
          mkdir -p release/docker
          cp docker-compose.yml release/docker/docker-compose.yml
          cp docker-compose.prod.yml release/docker/docker-compose.prod.yml
          cp .env.docker.example release/docker/.env.docker.example
          cp .env.prod.example release/docker/.env.prod.example
          cp scripts/deploy.ps1 release/docker/deploy.ps1
          cp release-docker-compose.resolved.yml release/docker/docker-compose.resolved.yml

      - name: Tải artifact Docker lên
        uses: actions/upload-artifact@v7
        with:
          name: docker-release-bundle-${{ needs.prepare-release.outputs.release_sha_short }}
          path: release/docker

  publish-container-images:
    runs-on: ubuntu-latest
    needs: prepare-release

    steps:
      - name: Tải mã nguồn
        uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Cài đặt Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Đăng nhập Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tạo metadata image backend
        id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/ai-for-education-backend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ needs.prepare-release.outputs.release_sha_short }}
            type=raw,value=${{ env.SOURCE_BRANCH }}

      - name: Tạo metadata image frontend
        id: frontend-meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/ai-for-education-frontend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ needs.prepare-release.outputs.release_sha_short }}
            type=raw,value=${{ env.SOURCE_BRANCH }}

      - name: Build và đẩy image backend lên Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          build-args: |
            REQUIREMENTS_FILE=requirements.txt
            # Để 1/1 nếu muốn image publish bám sát local, kể cả CUDA/Playwright.
            # Nếu muốn pipeline CI/CD nhẹ hơn, có thể tự đổi về 0/0.
            INSTALL_GPU_RUNTIME=0
            INSTALL_PLAYWRIGHT_BROWSER=0
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}

      - name: Build và đẩy image frontend lên Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_API_HOST=${{ vars.NEXT_PUBLIC_API_HOST }}
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}

      - name: Tạo báo cáo publish image
        shell: bash
        run: |
          mkdir -p release/images
          cat > release/images/dockerhub-images.md <<EOF
          # Docker images đã publish lên Docker Hub

          ## Backend

          ${{ steps.backend-meta.outputs.tags }}

          ## Frontend

          ${{ steps.frontend-meta.outputs.tags }}
          EOF

      - name: Tải artifact báo cáo image lên
        uses: actions/upload-artifact@v7
        with:
          name: dockerhub-images-${{ needs.prepare-release.outputs.release_sha_short }}
          path: release/images/dockerhub-images.md

  deploy-placeholder:
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - build-frontend-artifact
      - package-backend-artifact
      - package-docker-bundle
      - publish-container-images
    environment:
      name: ${{ github.event.inputs.target_environment || 'production-local' }}

    steps:
      - name: Kiểm tra secrets deploy SSH
        shell: bash
        run: |
          [ -n "${{ secrets.DEPLOY_HOST }}" ] || { echo "Missing secret: DEPLOY_HOST"; exit 1; }
          [ -n "${{ secrets.DEPLOY_USERNAME }}" ] || { echo "Missing secret: DEPLOY_USERNAME"; exit 1; }
          [ -n "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" ] || { echo "Missing secret: DEPLOY_SSH_PRIVATE_KEY"; exit 1; }

      - name: Triển khai lên máy local qua SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          script: |
            powershell -NoProfile -ExecutionPolicy Bypass -File D:\DACN\scripts\deploy.ps1

      - name: Tạo báo cáo triển khai
        shell: bash
        run: |
          mkdir -p release/deploy
          cat > release/deploy/deployment-summary.md <<EOF
          # Báo cáo triển khai tự động

          - Bản phát hành: ${{ needs.prepare-release.outputs.release_name }}
          - Phiên bản: ${{ needs.prepare-release.outputs.release_version }}
          - Môi trường đích: ${TARGET_ENVIRONMENT}
          - Nhánh nguồn: ${SOURCE_BRANCH}
          - Commit: ${SOURCE_SHA}
          - Người kích hoạt: ${GITHUB_ACTOR}
          - Lần chạy workflow: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          - Registry image: Docker Hub
          - Cách triển khai: GitHub Actions SSH vào host và chạy scripts/deploy.ps1

          Trạng thái hiện tại:

          - Frontend/Backend images đã publish lên Docker Hub
          - Deploy đã chạy tự động trên host mục tiêu
          - Host thực hiện pull image mới và restart stack theo docker-compose.prod.yml
          EOF
          cat release/deploy/deployment-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Tải artifact báo cáo triển khai lên
        uses: actions/upload-artifact@v7
        with:
          name: deployment-summary-${{ needs.prepare-release.outputs.release_sha_short }}
          path: |
            release/deploy/deployment-summary.md
            release/metadata/release-metadata.json
            release/metadata/release-notes.md

  release-bundle:
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - build-frontend-artifact
      - package-backend-artifact
      - package-docker-bundle
      - publish-container-images
      - deploy-placeholder

    steps:
      - name: Tải artifact metadata phát hành xuống
        uses: actions/download-artifact@v7
        with:
          name: cd-release-metadata
          path: release-bundle/metadata

      - name: Tải artifact frontend xuống
        uses: actions/download-artifact@v7
        with:
          name: frontend-release-bundle-${{ needs.prepare-release.outputs.release_sha_short }}
          path: release-bundle/frontend

      - name: Tải artifact backend xuống
        uses: actions/download-artifact@v7
        with:
          name: backend-release-bundle-${{ needs.prepare-release.outputs.release_sha_short }}
          path: release-bundle/backend

      - name: Tải artifact Docker xuống
        uses: actions/download-artifact@v7
        with:
          name: docker-release-bundle-${{ needs.prepare-release.outputs.release_sha_short }}
          path: release-bundle/docker

      - name: Tải artifact báo cáo triển khai xuống
        uses: actions/download-artifact@v7
        with:
          name: deployment-summary-${{ needs.prepare-release.outputs.release_sha_short }}
          path: release-bundle/deploy

      - name: Tải artifact báo cáo image xuống
        uses: actions/download-artifact@v7
        with:
          name: dockerhub-images-${{ needs.prepare-release.outputs.release_sha_short }}
          path: release-bundle/images

      - name: Tải artifact bundle phát hành tổng hợp lên
        uses: actions/upload-artifact@v7
        with:
          name: full-release-bundle-${{ needs.prepare-release.outputs.release_sha_short }}
          path: release-bundle

  cd-summary:
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - build-frontend-artifact
      - package-backend-artifact
      - package-docker-bundle
      - publish-container-images
      - deploy-placeholder
      - release-bundle
    if: always()
    steps:
      - name: Tạo tóm tắt công việc CD chi tiết (Detailed CD Job Summary)
        uses: actions/github-script@v8
        with:
          script: |
            const results = {
              prepare: "${{ needs.prepare-release.result }}",
              frontend: "${{ needs.build-frontend-artifact.result }}",
              backend: "${{ needs.package-backend-artifact.result }}",
              docker: "${{ needs.package-docker-bundle.result }}",
              images: "${{ needs.publish-container-images.result }}",
              deploy: "${{ needs.deploy-placeholder.result }}",
              bundle: "${{ needs.release-bundle.result }}"
            };
            
            const statusIcon = (res) => res === "success" ? "✅" : (res === "failure" ? "❌" : "⏭️");
            const statusText = (res) => res === "success" ? "Thành công" : (res === "failure" ? "Thất bại" : "Bỏ qua");

            const summary = `
            # 🚢 Báo cáo Tóm tắt CD Chi tiết (Dự Án AI Learning Studio)
            
            | Thông tin | Chi tiết |
            | :--- | :--- |
            | **Bản phát hành** | \`${{ needs.prepare-release.outputs.release_name }}\` |
            | **Phiên bản** | \`${{ needs.prepare-release.outputs.release_version }}\` |
            | **Môi trường** | \`${process.env.TARGET_ENVIRONMENT}\` |
            | **Người thực hiện** | @${context.actor} |
            | **Thời điểm** | ${new Date().toLocaleString('vi-VN', { timeZone: 'Asia/Ho_Chi_Minh' })} |
            
            ---

            ## 📦 Trạng thái quy trình (Pipeline Status)
            | Thành phần | Trạng thái | Chi tiết |
            | :--- | :---: | :--- |
            | 🛠️ **Chuẩn bị Metadata** | ${statusIcon(results.prepare)} | ${statusText(results.prepare)} |
            | 🖥️ **Build Frontend** | ${statusIcon(results.frontend)} | ${statusText(results.frontend)} |
            | ⚙️ **Package Backend** | ${statusIcon(results.backend)} | ${statusText(results.backend)} |
            | 🐳 **Resolve Docker** | ${statusIcon(results.docker)} | ${statusText(results.docker)} |
            | 📦 **Publish Docker Hub Images** | ${statusIcon(results.images)} | ${statusText(results.images)} |
            | 🚀 **Deploy qua SSH** | ${statusIcon(results.deploy)} | ${statusText(results.deploy)} |
            | 📚 **Tổng hợp Release Bundle** | ${statusIcon(results.bundle)} | ${statusText(results.bundle)} |
            
            ---

            ### 🖇️ Artifacts liên quan
            - **Full Release Bundle:** \`full-release-bundle-${{ needs.prepare-release.outputs.release_sha_short }}\`
            - **Frontend Build:** \`frontend-release-bundle-${{ needs.prepare-release.outputs.release_sha_short }}\`
            - **Backend Package:** \`backend-release-bundle-${{ needs.prepare-release.outputs.release_sha_short }}\`
            - **Docker Hub Image Report:** \`dockerhub-images-${{ needs.prepare-release.outputs.release_sha_short }}\`
            
            ---
            *Ghi chú: Pipeline này publish image lên Docker Hub và deploy tự động qua SSH vào host local đã cấu hình.*
            `;
            
            core.summary.addRaw(summary).write();

  report-failure:
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - build-frontend-artifact
      - package-backend-artifact
      - package-docker-bundle
      - publish-container-images
      - deploy-placeholder
      - release-bundle
    if: >-
      always() &&
      (
        needs.prepare-release.result == 'failure' ||
        needs.build-frontend-artifact.result == 'failure' ||
        needs.package-backend-artifact.result == 'failure' ||
        needs.package-docker-bundle.result == 'failure' ||
        needs.publish-container-images.result == 'failure' ||
        needs.deploy-placeholder.result == 'failure' ||
        needs.release-bundle.result == 'failure'
      )

    steps:
      - name: Tạo hoặc cập nhật GitHub Issue khi CD lỗi
        uses: actions/github-script@v8
        env:
          PREPARE_RESULT: ${{ needs.prepare-release.result }}
          FRONTEND_RESULT: ${{ needs.build-frontend-artifact.result }}
          BACKEND_RESULT: ${{ needs.package-backend-artifact.result }}
          DOCKER_RESULT: ${{ needs.package-docker-bundle.result }}
          IMAGES_RESULT: ${{ needs.publish-container-images.result }}
          DEPLOY_RESULT: ${{ needs.deploy-placeholder.result }}
          BUNDLE_RESULT: ${{ needs.release-bundle.result }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = process.env.GITHUB_REF_NAME || 'main';
            const title = `🚨 [CD Failure] Luồng CD thất bại trên nhánh ${branch}`;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

            const rows = [
              ['Chuẩn bị phát hành', process.env.PREPARE_RESULT],
              ['Bundle frontend', process.env.FRONTEND_RESULT],
              ['Bundle backend', process.env.BACKEND_RESULT],
              ['Bundle Docker', process.env.DOCKER_RESULT],
              ['Publish Docker Hub images', process.env.IMAGES_RESULT],
              ['Triển khai qua SSH', process.env.DEPLOY_RESULT],
              ['Bundle phát hành tổng hợp', process.env.BUNDLE_RESULT],
            ];

            const toStatus = (value) => value === 'success' ? '✅ THÀNH CÔNG' : value === 'failure' ? '❌ THẤT BẠI' : '⏭️ BỎ QUA';
            const failedJobs = rows.filter(([(name), result]) => result === 'failure').map(([name]) => `- ${name}`).join('\n');
            const table = rows.map(([name, result]) => `| ${name} | ${toStatus(result)} |`).join('\n');

            const body = [
              '## Báo cáo lỗi CD',
              '',
              'CD tượng trưng gặp lỗi sau một lần chạy pipeline phát hành.',
              '',
              `- Nhánh: \`${branch}\``,
              `- Commit: \`${process.env.SOURCE_SHA || context.sha}\``,
              `- Người kích hoạt: @${context.actor}`,
              `- Workflow: \`${context.workflow}\``,
              `- Môi trường đích: \`${process.env.TARGET_ENVIRONMENT || 'staging-placeholder'}\``,
              '',
              '### Các job lỗi',
              failedJobs || '- Không xác định được job lỗi',
              '',
              '### Trạng thái các job',
              '| Job | Trạng thái |',
              '| :--- | :--- |',
              table,
              '',
              '### Chi tiết lần chạy',
              `- GitHub Actions: ${runUrl}`,
              '',
              'Thông báo này được tạo tự động bởi GitHub Actions.',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const existingIssue = issues.find((issue) => issue.title === title);

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existingIssue.number,
                body: `Cập nhật lỗi CD mới:\n\n${body}`,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ['bug', 'cd-failure'],
                assignees: [context.actor],
              });
            }
